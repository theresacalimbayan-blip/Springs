<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Springs Payroll</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Lock Screen -->
<div id="lock-screen">
  <div class="lock-box">
    <div class="lock-logo"><img src="logo.svg" width="48" height="48" alt="Springs"></div>
    <h2>Springs Payroll</h2>

    <!-- Setup (first time) -->
    <div id="lock-setup" class="lock-panel hidden">
      <p>Create a password to protect your payroll data.</p>
      <input type="password" id="setup-password" placeholder="Create password (min 4 characters)" autocomplete="new-password">
      <input type="password" id="setup-confirm" placeholder="Confirm password" autocomplete="new-password">
      <div id="lock-error" class="lock-error hidden"></div>
      <button class="btn-primary" onclick="setupPassword()">Set Password</button>
    </div>

    <!-- Login -->
    <div id="lock-login" class="lock-panel hidden">
      <p>Enter your password to access payroll data.</p>
      <input type="password" id="login-password" placeholder="Password" autocomplete="current-password">
      <div id="lock-error-login" class="lock-error hidden"></div>
      <button class="btn-primary" onclick="verifyPassword()">Unlock</button>
    </div>
  </div>
</div>

<div id="app" class="hidden">
  <header>
    <div class="header-logo">
      <img src="logo.svg" width="32" height="32" alt="Springs">
      <h1>Springs Payroll</h1>
    </div>
    <nav>
      <button class="tab-btn active" data-tab="contractors">Contractors</button>
      <button class="tab-btn" data-tab="entry">Payroll Entry</button>
      <button class="tab-btn" data-tab="summary">Summary</button>
    </nav>
    <div class="header-actions">
      <button class="btn-header" onclick="exportData()" title="Save a backup file to your computer">Export Backup</button>
      <label class="btn-header" title="Load data from a backup file">
        Import Backup
        <input type="file" id="import-file" accept=".json" onchange="importData(event)" style="display:none">
      </label>
      <button class="btn-header btn-lock" onclick="lockApp()" title="Lock the app">🔒 Lock</button>
    </div>
  </header>

  <!-- Contractors Tab -->
  <div id="tab-contractors" class="tab active">
    <div class="toolbar">
      <h2>Contractors</h2>
      <div class="toolbar-actions">
        <span class="sort-label">Sort:</span>
        <button id="sort-by-name" class="btn-sort active" onclick="sortContractors('name')">Name</button>
        <button id="sort-by-type" class="btn-sort" onclick="sortContractors('type')">Type</button>
        <div class="toolbar-divider"></div>
        <button class="btn-sm" onclick="downloadContractorsTemplate()">Template</button>
        <label class="btn-sm" style="cursor:pointer">Import CSV
          <input type="file" accept=".csv" style="display:none" onchange="importContractors(event)">
        </label>
        <button id="btn-bulk-delete" class="btn-sm btn-danger hidden" onclick="deleteSelectedContractors()">Delete Selected</button>
        <button id="btn-add-contractor" class="btn-primary">+ Add Contractor</button>
      </div>
    </div>
    <table class="data-table">
      <thead>
        <tr>
          <th style="width:36px"><input type="checkbox" id="select-all-contractors" onchange="toggleSelectAll(this.checked)"></th>
          <th>Name</th><th>Type</th><th>Status</th><th></th>
        </tr>
      </thead>
      <tbody id="contractors-tbody"></tbody>
    </table>
  </div>

  <!-- Payroll Entry Tab -->
  <div id="tab-entry" class="tab">
    <div class="toolbar">
      <h2>Payroll Entry</h2>
      <div class="month-picker">
        <select id="entry-month"></select>
        <select id="entry-year"></select>
      </div>
    </div>
    <div id="entry-body"></div>
  </div>

  <!-- Summary Tab -->
  <div id="tab-summary" class="tab">
    <div class="toolbar">
      <h2>Payroll Summary</h2>
      <div class="month-picker">
        <select id="summary-month"></select>
        <select id="summary-year"></select>
        <select id="summary-status-filter">
          <option value="active">Active Only</option>
          <option value="all">All</option>
          <option value="inactive">Inactive Only</option>
        </select>
        <button id="btn-calculate" class="btn-primary">Calculate</button>
      </div>
    </div>
    <div id="summary-body"></div>
  </div>
</div>
</div>

<!-- Modal -->
<div id="modal" class="modal hidden">
  <div class="modal-box">
    <button class="modal-close" id="btn-close-modal">&times;</button>
    <div id="modal-body"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
